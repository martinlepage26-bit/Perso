register_version: "1.0.0"
artifacts:
  - artifact_id: EV-001
    artifact_type: model_output_log
    supports: {thresholds: [T003], claims: [C-001], decisions: []}
    owner_role: system_owner
    storage_uri: "cases/${case_id}/artifacts/output-log.ndjson"
    retention_policy: "24_months"
    retrieval_method: "query by case_id + timestamp"
    sensitivity: internal
    human_signoff_required: false
    provenance:
      linked_case_id: "${case_id}"
      source_system: output_pipeline
