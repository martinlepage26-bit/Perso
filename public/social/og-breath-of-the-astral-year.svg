<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 630" role="img" aria-labelledby="title desc">
  <title id="title">Breath of the Astral Year social card</title>
  <desc id="desc">Breath of the Astral Year visual with orbiting geometry, atmospheric gradients, and Earth-bound book framing.</desc>
  <defs>
    <linearGradient id="bg" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#09121f" />
      <stop offset="50%" stop-color="#112539" />
      <stop offset="100%" stop-color="#20313e" />
    </linearGradient>
    <radialGradient id="mistA" cx="20%" cy="18%" r="58%">
      <stop offset="0%" stop-color="#6ee2d0" stop-opacity="0.3" />
      <stop offset="100%" stop-color="#6ee2d0" stop-opacity="0" />
    </radialGradient>
    <radialGradient id="mistB" cx="80%" cy="22%" r="46%">
      <stop offset="0%" stop-color="#f0b95f" stop-opacity="0.24" />
      <stop offset="100%" stop-color="#f0b95f" stop-opacity="0" />
    </radialGradient>
    <linearGradient id="ring" x1="0%" x2="100%" y1="0%" y2="100%">
      <stop offset="0%" stop-color="#f0b95f" stop-opacity="0.62" />
      <stop offset="100%" stop-color="#6ee2d0" stop-opacity="0.72" />
