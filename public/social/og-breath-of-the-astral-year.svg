    <circle r="96" fill="none" stroke="#6ee2d0" stroke-opacity="0.34" stroke-width="1.5" />
    <circle r="28" fill="#eef4f8" fill-opacity="0.9" />
    <circle r="10" fill="#102538" />
    <path d="M0-228V-252M161-161l17-17M228 0h24M161 161l17 17M0 228v24M-161 161l-17 17M-228 0h-24M-161-161l-17-17" stroke="#eef4f8" stroke-opacity="0.44" stroke-width="3" stroke-linecap="round" />
    <g fill="#eef4f8" fill-opacity="0.92" font-family="Georgia, serif" font-size="30" text-anchor="middle">
