      <text x="89" y="-154">♉</text>
      <text x="154" y="-89">♊</text>
      <text x="178" y="10">♋</text>
      <text x="154" y="108">♌</text>
      <text x="89" y="174">♍</text>
      <text x="0" y="198">♎</text>
      <text x="-89" y="174">♏</text>
      <text x="-154" y="108">♐</text>
      <text x="-178" y="10">♑</text>
      <text x="-154" y="-89">♒</text>
      <text x="-89" y="-154">♓</text>
