  <g fill="#eef4f8">
    <text x="88" y="124" font-family="Georgia, serif" font-size="28" letter-spacing="6" opacity="0.78">GAIALOGY • A BOOK OF SIGNS AND EARTHLY WEATHER</text>
    <text x="88" y="236" font-family="Georgia, serif" font-size="70" font-weight="700">Breath of the</text>
    <text x="88" y="316" font-family="Georgia, serif" font-size="70" font-weight="700">Astral Year</text>
    <text x="88" y="384" font-family="Georgia, serif" font-size="30" opacity="0.9">A book that looks for meaning on Earth,</text>
    <text x="88" y="430" font-family="Georgia, serif" font-size="30" opacity="0.9">in weather, bodies, seasons, and the Sun.</text>
  </g>

  <g fill="#d8e5ec" font-family="Georgia, serif" font-size="24" opacity="0.8">
    <text x="88" y="500">Grounded symbolic life, kept close to Earth.</text>
    <text x="88" y="536">Signs as feeling, season, and Earth energy.</text>
